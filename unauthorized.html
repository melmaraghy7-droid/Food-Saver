<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodSaver — Unauthorized Access</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    .unauth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: radial-gradient(circle at 10% 20%, var(--bg-secondary) 0%, var(--bg-primary) 90%);
    }

    .unauth-card {
      background: var(--bg-card);
      border: 2px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      padding: 4rem 3rem;
      width: 100%;
      max-width: 600px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
    }

    .unauth-icon {
      width: 100px;
      height: 100px;
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem auto;
      border: 2px solid #ef4444;
    }

    html.dark .unauth-icon {
      background: rgba(239, 68, 68, 0.2);
    }

    .unauth-icon svg {
      width: 50px;
      height: 50px;
    }

    .unauth-card h2 {
      font-size: 2.25rem;
      color: var(--text-primary);
      margin-bottom: 1.25rem;
    }

    .unauth-card p {
      color: var(--text-secondary);
      font-size: 1.15rem;
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }

    .unauth-buttons {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .floating-controls {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.5rem;
    }

    body.lang-ar .floating-controls {
      right: auto;
      left: 1.5rem;
    }
  </style>
</head>
<body class="lang-en">

  <div class="unauth-wrapper">
    <div class="unauth-card">

      <!-- Lang / Theme Switcher in header of card -->
      <div class="floating-controls">
        <button class="icon-toggle" id="theme-toggle" aria-label="Toggle Dark Mode">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button class="action-btn login" id="lang-toggle" style="border: 1px solid var(--border-color); padding: 0.5rem 1rem;">العربية</button>
      </div>

      <div class="unauth-icon">
        <!-- Shield Warning Icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>

      <h2 data-i18n="unauthTitle">Access Denied — 403</h2>
      <p data-i18n="unauthDesc">You do not have the authorization privileges required to access this portal. If you logged in with a different account, make sure you are using correct matching credentials.</p>

      <div class="unauth-buttons">
        <a href="/index.html" class="btn btn-secondary" data-i18n="unauthBtnHome">Back to Home</a>
        <button id="btn-my-dashboard" class="btn btn-primary" data-i18n="unauthBtnDash" style="display: none;">Go to My Dashboard</button>
      </div>

    </div>
  </div>

  <script type="module">
    import { translations } from './translations.js';

    let currentLang = localStorage.getItem('foodsaver_lang') || 'en';
    let currentTheme = localStorage.getItem('foodsaver_theme') || 'light';

    // Theme Switcher Setup
    const htmlElement = document.documentElement;
    const bodyElement = document.body;
    const themeToggleBtn = document.getElementById('theme-toggle');
    const langToggleBtn = document.getElementById('lang-toggle');

    function applyTheme() {
      if (currentTheme === 'dark') {
        htmlElement.classList.add('dark');
        themeToggleBtn.querySelector('.sun-icon').style.display = 'block';
        themeToggleBtn.querySelector('.moon-icon').style.display = 'none';
      } else {
        htmlElement.classList.remove('dark');
        themeToggleBtn.querySelector('.sun-icon').style.display = 'none';
        themeToggleBtn.querySelector('.moon-icon').style.display = 'block';
      }
    }

    themeToggleBtn.addEventListener('click', () => {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      localStorage.setItem('foodsaver_theme', currentTheme);
      applyTheme();
    });

    // Language Switcher Setup
    function applyLanguage(lang) {
      if (lang === 'ar') {
        bodyElement.setAttribute('dir', 'rtl');
        bodyElement.classList.remove('lang-en');
        bodyElement.classList.add('lang-ar');
        langToggleBtn.textContent = 'English';
      } else {
        bodyElement.setAttribute('dir', 'ltr');
        bodyElement.classList.remove('lang-ar');
        bodyElement.classList.add('lang-en');
        langToggleBtn.textContent = 'العربية';
      }

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });
    }

    langToggleBtn.addEventListener('click', () => {
      currentLang = currentLang === 'en' ? 'ar' : 'en';
      localStorage.setItem('foodsaver_lang', currentLang);
      applyLanguage(currentLang);
    });

    // Initial setups
    applyTheme();
    applyLanguage(currentLang);

    // Check if user is logged in to show "Go to my dashboard" button
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('/api/auth/me');
        if (response.ok) {
          const data = await response.json();
          const user = data.user;
          const dashboardBtn = document.getElementById('btn-my-dashboard');
          
          dashboardBtn.style.display = 'inline-flex';
          dashboardBtn.addEventListener('click', () => {
            const role = user.role.toLowerCase();
            if (role === 'restaurant' || role === 'supermarket' || role === 'bakery') {
              window.location.href = '/dashboard-restaurant.html';
            } else if (role === 'charity') {
              window.location.href = '/dashboard-charity.html';
            } else if (role === 'volunteer') {
              window.location.href = '/dashboard-volunteer.html';
            } else if (role === 'admin') {
              window.location.href = '/dashboard-admin.html';
            }
          });
        }
      } catch (err) {
        console.log('Not logged in, hiding dashboard redirect button.');
      }
    });
  </script>
</body>
</html>
