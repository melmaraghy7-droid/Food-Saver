<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodSaver — Page Not Found (404)</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    .error-layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      padding: 1.5rem;
    }

    .error-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      padding: 3.5rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: modalSlideUp 0.4s ease;
    }

    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(117, 201, 127, 0.15);
      color: var(--brand-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }

    .error-icon svg {
      width: 38px;
      height: 38px;
    }

    .error-code {
      font-size: 4rem;
      font-weight: 800;
      color: var(--brand-primary);
      margin-bottom: 0.5rem;
      line-height: 1;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .error-desc {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body class="lang-en">
  <div class="error-layout">
    <div class="error-card">
      <div class="error-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <div class="error-code">404</div>
      <h1 class="error-title" data-i18n="err404Title">Page Not Found</h1>
      <p class="error-desc" data-i18n="err404Desc">The page you are looking for does not exist or has been relocated to another address path.</p>
      <button class="btn btn-primary" onclick="window.location.href='/index.html'" style="padding: 0.85rem 2rem; font-weight: 700;" data-i18n="err404Return">Back to Homepage</button>
    </div>
  </div>

  <script type="module">
    import { translations } from './translations.js';
    
    let currentLang = localStorage.getItem('foodsaver_lang') || 'en';
    const bodyElement = document.body;

    function applyLanguage(lang) {
      if (lang === 'ar') {
        bodyElement.setAttribute('dir', 'rtl');
        bodyElement.classList.add('lang-ar');
      } else {
        bodyElement.setAttribute('dir', 'ltr');
        bodyElement.classList.add('lang-en');
      }

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });
    }

    applyLanguage(currentLang);
  </script>
</body>
</html>
